name: iagctl-import

on:
  push:
    branches:
      - main
    paths:
      - "import.yaml"
      - "scripts/**"
  workflow_dispatch:

jobs:
  import:
    name: Import services into IAG5 via Gateway Manager
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write iagctl config
        run: |
          mkdir -p ~/.iagctl
          cat > ~/.iagctl/config.yaml <<EOF
          server: ${{ secrets.IAG5_SERVER }}
          api-key: ${{ secrets.IAG5_API_KEY }}
          tls:
            ca: ${{ secrets.IAG5_CA_CERT }}
            insecure: false
          EOF

      - name: Verify iagctl connectivity
        run: iagctl version

      - name: Validate import file
        run: iagctl db import import.yaml --check

      - name: Import services
        run: iagctl db import import.yaml --force
